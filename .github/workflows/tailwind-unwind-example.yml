name: tailwind-unwind-example

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**/*.tsx'
      - 'src/**/*.jsx'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci && npm run build

      - name: Analyze Tailwind patterns
        run: node bin/index.js analyze ./test-project --format json --top 5

  apply-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci && npm run build

      - name: Preview apply (dry-run)
        run: node bin/index.js apply ./test-project --output styles/components.css --dry-run --format json --min-occurrences 2
